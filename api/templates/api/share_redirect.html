<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>{{ page_title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ og_description }}" />
    <link rel="canonical" href="{{ canonical_url }}" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ site_name }}" />
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:url" content="{{ canonical_url }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_PE" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <meta http-equiv="refresh" content="0; url={{ redirect_url }}" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(34,197,94,.18), transparent 35%),
          linear-gradient(180deg, #07120a, #030d06);
        color: #effff4;
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        width: min(92vw, 560px);
        padding: 28px;
        border-radius: 28px;
        border: 1px solid rgba(110,231,183,.14);
        background: rgba(5, 15, 9, .82);
        box-shadow: 0 24px 80px rgba(0,0,0,.34);
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(21,128,61,.28);
        color: #8ef0b0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      h1 { margin: 0 0 10px; font-size: 34px; line-height: 1.05; }
      p { margin: 0 0 16px; color: rgba(239,255,244,.76); line-height: 1.55; }
      .price {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        background: rgba(22,163,74,.18);
        color: #c5ffd8;
        font-size: 22px;
        font-weight: 800;
      }
      a {
        color: #8ef0b0;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">{{ eyebrow }}</span>
      <h1>{{ headline }}</h1>
      <p>{{ summary }}</p>
      <div class="price">{{ price_label }}</div>
      <p style="margin-top: 18px;">
        Redirigiendo al mapa interactivo. Si no abre automáticamente,
        <a href="{{ redirect_url }}">continúa aquí</a>.
      </p>
    </main>
    <script>
      (function () {
        var target = "{{ redirect_url|escapejs }}";
        if (target) window.location.replace(target);
      })();
    </script>
  </body>
</html>
